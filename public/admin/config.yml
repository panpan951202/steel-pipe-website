backend:
  name: github
  repo: panpan951202/steel-pipe-website
  branch: master
  base_url: https://radiant-phoenix-d4e6a6.netlify.app
  auth_endpoint: /api/auth

site_url: https://radiant-phoenix-d4e6a6.netlify.app

media_folder: public/images
public_folder: /images

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: content/products
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: Slug
        name: slug
        widget: string
      - label: Product Name
        name: name
        widget: string
      - label: Short Name
        name: shortName
        widget: string
      - label: Tagline
        name: tagline
        widget: text
      - label: Image
        name: image
        widget: image
        required: false
      - label: Category
        name: category
        widget: select
        options:
          - Seamless
          - Welded
      - label: Size Range
        name: sizeRange
        widget: string
      - label: Wall Thickness
        name: wallThickness
        widget: string
      - label: Length
        name: length
        widget: string
      - label: Specifications
        name: specifications
        widget: list
        summary: "{{fields.label}}"
        fields:
          - label: Parameter
            name: label
            widget: string
          - label: Value
            name: value
            widget: string
      - label: Applications
        name: applications
        widget: list
        field:
          label: Application
          name: item
          widget: string
      - label: Standards
        name: standards
        widget: list
        field:
          label: Standard
          name: item
          widget: string
      - label: Features
        name: features
        widget: list
        field:
          label: Feature
          name: item
          widget: string
      - label: FAQ
        name: faq
        widget: list
        required: false
        summary: "{{fields.question}}"
        fields:
          - label: Question
            name: question
            widget: string
          - label: Answer
            name: answer
            widget: text
      - label: SEO Title
        name: metaTitle
        widget: string
      - label: SEO Description
        name: metaDescription
        widget: text
      - label: Full Description
        name: body
        widget: markdown

  - name: news
    label: News and Articles
    label_singular: Article
    folder: content/news
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: Slug
        name: slug
        widget: string
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: date
      - label: Author
        name: author
        widget: string
      - label: Category
        name: category
        widget: select
        options:
          - Industry News
          - Technical Guide
          - Technology
      - label: Excerpt
        name: excerpt
        widget: text
      - label: Tags
        name: tags
        widget: list
        field:
          label: Tag
          name: item
          widget: string
      - label: SEO Title
        name: metaTitle
        widget: string
      - label: SEO Description
        name: metaDescription
        widget: text
      - label: Content
        name: body
        widget: markdown
